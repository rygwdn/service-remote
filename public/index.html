<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="color-scheme" content="dark">
  <title>Service Remote</title>
  <link rel="stylesheet" href="/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data>
  <header>
    <h1>Service Remote</h1>
    <div class="status-dots">
      <span class="dot" :class="{ connected: $store.state.obs.connected }" title="OBS"></span>
      <span class="dot-label">OBS</span>
      <span class="dot" :class="{ connected: $store.state.x32.connected }" title="X32"></span>
      <span class="dot-label">X32</span>
      <span class="dot" :class="{ connected: $store.state.proclaim.connected }" title="Proclaim"></span>
      <span class="dot-label">Proclaim</span>
      <span class="dot" :class="{ connected: $store.state.ptz.cameras.some(c => c.connected) }" title="PTZ Camera" x-show="$store.state.ptz.cameras.length > 0"></span>
      <span class="dot-label" x-show="$store.state.ptz.cameras.length > 0">PTZ</span>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab" :class="{ active: $store.ui.tab==='overview' }" @click="$store.ui.setTab('overview')">Overview</button>
    <button class="tab" :class="{ active: $store.ui.tab==='proclaim' }" @click="$store.ui.setTab('proclaim')">Proclaim</button>
    <button class="tab" :class="{ active: $store.ui.tab==='obs' }"      @click="$store.ui.setTab('obs')">OBS</button>
    <button class="tab" :class="{ active: $store.ui.tab==='sound' }"    @click="$store.ui.setTab('sound')">Sound</button>
    <button class="tab" :class="{ active: $store.ui.tab==='camera' }"   @click="$store.ui.setTab('camera')">Camera</button>
    <button class="tab" :class="{ active: $store.ui.tab==='settings' }" @click="$store.ui.setTab('settings')">Settings</button>
  </nav>

  <main>

    <!-- ===================== Overview Panel ===================== -->
    <section class="panel" :class="{ active: $store.ui.tab==='overview' }">
      <div class="overview-grid">
        <!-- Row 1: Proclaim now-playing | OBS scene -->
        <div class="ov-cell ov-slide-desc" x-html="ovNowPlaying($store.state.proclaim)"></div>
        <div class="ov-cell ov-scene-info">
          <span class="ov-scene-name" x-text="$store.state.obs.currentScene"></span>
          <div class="ov-status-row">
            <span class="ov-status-pill active" x-show="$store.state.obs.streaming">LIVE</span>
            <span class="ov-status-pill active" x-show="$store.state.obs.recording">REC</span>
          </div>
        </div>

        <!-- Row 2: Proclaim current slide thumb | OBS preview -->
        <div class="slide-thumb active" x-html="thumbHtml(ovThumbs($store.state.proclaim).current)"></div>
        <div class="ov-obs-preview-wrap">
          <img id="ov-obs-preview" class="ov-obs-preview" src="" alt="Program">
        </div>

        <!-- Row 3: Slide nav buttons -->
        <button class="btn btn-large" @click="sendAction('PreviousSlide')">&#8592; Slide</button>
        <button class="btn btn-large" @click="sendAction('NextSlide')">Slide &#8594;</button>

        <!-- Row 4: Prev / next slide thumbs -->
        <div class="slide-thumb" x-html="thumbHtml(ovThumbs($store.state.proclaim).prev)"></div>
        <div class="slide-thumb" x-html="thumbHtml(ovThumbs($store.state.proclaim).next)"></div>

        <!-- Row 5: X32 compact levels + OBS compact levels (full width, stacked) -->
        <div class="ov-block ov-full-width">
          <div class="ov-title">Mix</div>
          <div class="ov-channel-list ov-channel-grid">
            <template x-for="ch in sortedX32Channels($store.state.x32.channels)" :key="ch.type+'/'+ch.index">
              <div class="ov-channel-row" x-show="!$store.ui.isHiddenX32(ch.type+'/'+ch.index)" :class="'ov-channel-row--'+ch.type">
                <span class="ov-ch-label" :class="{ muted: ch.muted }" :style="ch.muted ? null : x32LabelStyle(ch)" x-text="ch.label"></span>
                <div class="ov-bars">
                  <div class="ov-fader-bar"><div class="ov-fader-fill" :class="{ muted: ch.muted }" :style="'width:'+((ch.fader*100).toFixed(1))+'%'"></div></div>
                  <div class="ov-level-bar"><div class="ov-level-fill" :data-level-key="`${ch.type}-${ch.index}`" :style="'width:'+mulToDisplayPct(ch.level).toFixed(1)+'%'"></div></div>
                </div>
              </div>
            </template>
          </div>
        </div>
        <div class="ov-block ov-full-width">
          <div class="ov-title">OBS</div>
          <div class="ov-channel-list ov-channel-grid">
            <template x-for="src in $store.state.obs.audioSources" :key="src.name">
              <div class="ov-channel-row" x-show="!$store.ui.isHiddenObs(src.name)">
                <span class="ov-ch-label" :class="{ muted: src.muted }" x-text="src.name"></span>
                <div class="ov-bars">
                  <div class="ov-fader-bar"><div class="ov-fader-fill" :class="{ muted: src.muted }" :style="'width:'+(((src.volume??-60)+60)/60*100).toFixed(1)+'%'"></div></div>
                  <div class="ov-level-bar"><div class="ov-level-fill" :data-level-obs="src.name" :style="'width:'+mulToDisplayPct(src.level).toFixed(1)+'%'"></div></div>
                </div>
              </div>
            </template>
          </div>
        </div>
      </div>
    </section>

    <!-- ===================== Proclaim Panel ===================== -->
    <section class="panel" :class="{ active: $store.ui.tab==='proclaim' }">
      <div class="slide-strip">
        <div class="slide-thumb"        x-html="thumbHtml(ovThumbs($store.state.proclaim).prev)"></div>
        <div class="slide-thumb active" x-html="thumbHtml(ovThumbs($store.state.proclaim).current)"></div>
        <div class="slide-thumb"        x-html="thumbHtml(ovThumbs($store.state.proclaim).next)"></div>
      </div>
      <div class="proclaim-now-playing" x-html="ovNowPlaying($store.state.proclaim)"></div>
      <div class="proclaim-controls">
        <div class="control-row">
          <button class="btn btn-large btn-primary" @click="sendAction('PreviousSlide')">Prev Slide</button>
          <button class="btn btn-large btn-primary" @click="sendAction('NextSlide')">Next Slide</button>
        </div>
        <div class="control-row">
          <button class="btn btn-large btn-on-air"
                  :class="{ active: $store.state.proclaim.onAir }"
                  @click="window.confirm($store.state.proclaim.onAir ? 'Go Off Air?' : 'Go On Air?') && sendAction($store.state.proclaim.onAir ? 'GoOffAir' : 'GoOnAir')"
                  x-text="$store.state.proclaim.onAir ? 'On Air' : 'Go On Air'"></button>
        </div>
        <div class="control-row proclaim-av-controls" x-show="$store.state.proclaim.currentItemType === 'Video'">
          <button class="btn" @click="sendAction('VideoPause')">⏸</button>
          <button class="btn" @click="sendAction('VideoPlay')">▶</button>
          <button class="btn" @click="sendAction('VideoRewind')">⏪</button>
          <button class="btn" @click="sendAction('VideoFastForward')">⏩</button>
          <button class="btn" @click="sendAction('VideoRestart')">⏮</button>
        </div>
        <div class="control-row proclaim-av-controls" x-show="$store.state.proclaim.currentItemType !== 'Video'">
          <button class="btn" @click="sendAction('NextAudioItem')">Audio &#9654;&#9654;</button>
        </div>
      </div>
      <div class="slide-grid"
           x-show="slideGridVisible($store.state.proclaim)"
           x-data>
        <template x-for="i in slideGridItems($store.state.proclaim)" :key="i">
          <button class="slide-thumb-btn"
                  :class="{ active: i === $store.state.proclaim.slideIndex }"
                  @click="sendAction('GoToSlide', i + 1)">
            <img :src="thumbUrl($store.state.proclaim.currentItemId, i)" alt="">
          </button>
        </template>
      </div>
      <div class="proclaim-items">
        <template x-for="entry in flatServiceItems($store.state.proclaim)" :key="entry.key">
          <div style="display:contents">
            <div x-show="entry.type==='section'" class="item-section-header" x-text="entry.label"></div>
            <div x-show="entry.type==='group'"   class="item-group-header"   x-text="entry.label"></div>
            <button x-show="entry.type==='item'"
                    class="item-btn"
                    :class="{ active: entry.isActive, 'item-grouped': entry.item && entry.item.group }"
                    @click="entry.item && gotoItem(entry.item.id)">
              <span x-text="entry.item ? (entry.item.title || entry.item.kind) : ''"></span>
              <span class="item-slide-count" x-show="entry.slideCountLabel" x-text="' '+entry.slideCountLabel"></span>
            </button>
          </div>
        </template>
      </div>
    </section>

    <!-- ===================== OBS Panel ===================== -->
    <section class="panel" :class="{ active: $store.ui.tab==='obs' }">
      <div class="obs-section">
        <h2>Output</h2>
        <div class="control-row">
          <button id="obs-stream-btn" class="btn" :class="{ active: $store.state.obs.streaming }"
                  @click="window.confirm($store.state.obs.streaming ? 'Stop streaming?' : 'Start streaming?') && toggleStream()"
                  x-text="$store.state.obs.streaming ? 'Streaming' : 'Stream'"></button>
          <button id="obs-record-btn" class="btn" :class="{ active: $store.state.obs.recording }"
                  @click="window.confirm($store.state.obs.recording ? 'Stop recording?' : 'Start recording?') && toggleRecord()"
                  x-text="$store.state.obs.recording ? 'Recording' : 'Record'"></button>
        </div>
        <div class="youtube-status" x-show="$store.state.youtube.broadcastTitle || $store.state.youtube.viewerCount !== null">
          <span class="youtube-broadcast-title" x-show="$store.state.youtube.broadcastTitle" x-text="$store.state.youtube.broadcastTitle"></span>
          <span class="youtube-viewers" x-show="$store.state.youtube.viewerCount !== null" x-text="'👁 ' + $store.state.youtube.viewerCount + ' watching'"></span>
        </div>
        <div class="youtube-controls" x-show="$store.state.youtube.broadcastId">
          <button class="btn youtube-go-live-btn"
                  x-show="$store.state.youtube.broadcastStatus !== 'live'"
                  @click="window.confirm('Go live on YouTube?') && startYouTubeBroadcast()">Go Live</button>
          <button class="btn youtube-end-stream-btn"
                  x-show="$store.state.youtube.broadcastStatus === 'live'"
                  @click="window.confirm('End the YouTube stream?') && stopYouTubeBroadcast()">End Stream</button>
        </div>
      </div>
      <div class="obs-section">
        <div class="ov-obs-preview-wrap">
          <img id="obs-preview" class="ov-obs-preview" src="" alt="Program">
        </div>
      </div>
      <div class="obs-section">
        <h2>Scenes</h2>
        <div class="scene-grid">
          <template x-for="scene in $store.state.obs.scenes" :key="scene">
            <button class="scene-btn" :class="{ active: scene===$store.state.obs.currentScene }"
                    @click="setScene(scene)" x-text="scene"></button>
          </template>
        </div>
      </div>
      <div class="obs-section">
        <div class="section-header-row">
          <h2>Audio</h2>
          <div class="header-btn-group">
            <button class="btn btn-edit-toggle"
                    :class="{ active: $store.ui.faderEnabled.obs }"
                    @click="$store.ui.toggleFaderEnabled('obs')"
                    x-text="$store.ui.faderEnabled.obs ? 'Unlocked' : 'Locked'"></button>
            <button class="btn btn-edit-toggle"
                    :class="{ active: $store.ui.editMode.obs }"
                    @click="$store.ui.toggleEditMode('obs')"
                    x-text="$store.ui.editMode.obs ? 'Done' : 'Edit'"></button>
          </div>
        </div>
        <div class="audio-list">
          <template x-for="src in $store.state.obs.audioSources" :key="src.name">
            <div class="audio-source"
                 :class="{ live: src.live }"
                 x-show="$store.ui.editMode.obs || !$store.ui.isHiddenObs(src.name)"
                 x-data="obsFader(src)">
              <span class="name" x-text="src.name"></span>
              <input type="range" min="-60" max="0" step="0.5"
                     :disabled="!$store.ui.faderEnabled.obs"
                     :value="src.volume != null && isFinite(src.volume) ? src.volume.toFixed(1) : -60"
                     @input="setObsVolume(src.name, parseFloat($event.target.value))">
              <button class="mute-btn" :class="{ muted: src.muted }"
                      @click="toggleObsMute(src.name)"
                      x-text="src.muted ? 'M' : '🔊'"></button>
              <div class="obs-meter"><div class="obs-meter-fill" :data-level-obs="src.name" :style="'width:'+mulToDisplayPct(src.level).toFixed(1)+'%'"></div></div>
              <label class="fader-visibility-label" x-show="$store.ui.editMode.obs">
                <input type="checkbox"
                       class="fader-visibility-cb"
                       :checked="!$store.ui.isHiddenObs(src.name)"
                       @change="toggleHiddenObs(src.name, $event.target.checked)">
                Show
              </label>
            </div>
          </template>
        </div>
      </div>
    </section>

    <!-- ===================== Sound (X32) Panel ===================== -->
    <section class="panel" :class="{ active: $store.ui.tab==='sound' }">
      <div class="section-header-row x32-header-row">
        <span></span>
        <div class="header-btn-group">
          <button class="btn btn-edit-toggle"
                  :class="{ active: $store.ui.faderEnabled.x32 }"
                  @click="$store.ui.toggleFaderEnabled('x32')"
                  x-text="$store.ui.faderEnabled.x32 ? 'Unlocked' : 'Locked'"></button>
          <button class="btn btn-edit-toggle"
                  :class="{ active: $store.ui.editMode.x32 }"
                  @click="$store.ui.toggleEditMode('x32')"
                  x-text="$store.ui.editMode.x32 ? 'Done' : 'Edit'"></button>
        </div>
      </div>
      <div class="channel-list-vert">
        <template x-for="ch in sortedX32Channels($store.state.x32.channels)" :key="ch.type+'/'+ch.index">
          <div class="channel-row-h"
               :class="'channel-row-h--'+ch.type"
               :style="x32ChStyle(ch)"
               x-show="$store.ui.editMode.x32 || !$store.ui.isHiddenX32(ch.type+'/'+ch.index)"
               x-data="x32Fader(ch)">
            <button class="ch-mute" :class="{ muted: ch.muted }"
                    :disabled="!$store.ui.faderEnabled.x32"
                    @click="toggleX32Mute(ch.index, ch.type)"
                    x-text="ch.muted ? 'MUTED' : 'ON'"></button>
            <span class="ch-label" x-text="ch.label"></span>
            <div class="fader-wrap-h">
              <input type="range" min="0" max="1" step="0.005"
                     :disabled="!$store.ui.faderEnabled.x32"
                     :value="touched ? undefined : ch.fader"
                     @input="onFaderInput(ch, $event.target)"
                     @mousedown="touched=true" @touchstart.passive="touched=true"
                     @mouseup="releaseSoon()" @touchend="releaseSoon()">
              <div class="ch-meter-h"><div class="ch-meter-fill-h" :data-level-key="`${ch.type}-${ch.index}`" :style="'width:'+mulToDisplayPct(ch.level).toFixed(1)+'%'"></div></div>
            </div>
            <label class="fader-visibility-label" x-show="$store.ui.editMode.x32">
              <input type="checkbox"
                     class="fader-visibility-cb"
                     :checked="!$store.ui.isHiddenX32(ch.type+'/'+ch.index)"
                     @change="toggleHiddenX32(ch.type+'/'+ch.index, $event.target.checked)">
              Show
            </label>
          </div>
        </template>
      </div>
    </section>

    <!-- ===================== Camera (PTZ) Panel ===================== -->
    <section class="panel" :class="{ active: $store.ui.tab==='camera' }"
             x-data="{ activeCam: 0 }">

      <!-- Camera selector (only shown when more than one camera is configured) -->
      <div class="ptz-cam-selector" x-show="$store.state.ptz.cameras.length > 1">
        <template x-for="(cam, i) in $store.state.ptz.cameras" :key="i">
          <button class="btn ptz-cam-btn"
                  :class="{ active: activeCam === i }"
                  @click="activeCam = i"
                  x-text="cam.name || ('Cam ' + (i + 1))"></button>
        </template>
      </div>

      <template x-if="$store.state.ptz.cameras.length === 0">
        <div class="ptz-disconnected">No cameras configured</div>
      </template>

      <template x-for="(cam, camIdx) in $store.state.ptz.cameras" :key="camIdx">
        <div class="ptz-panel" x-show="activeCam === camIdx">
          <div class="ptz-disconnected" x-show="!cam.connected" x-text="cam.name + ': disconnected'"></div>

          <!-- D-pad: Pan / Tilt — each press is a discrete go-to step; held = repeat -->
          <div class="ptz-dpad">
            <button class="ptz-btn ptz-up"
                    @pointerdown.prevent="ptzStartRepeat(() => ptzPanTilt(camIdx, 0, 1))"
                    @pointerup="ptzStopRepeat()"
                    @pointerleave="ptzStopRepeat()">&#9650;</button>
            <div class="ptz-middle-row">
              <button class="ptz-btn ptz-left"
                      @pointerdown.prevent="ptzStartRepeat(() => ptzPanTilt(camIdx, -1, 0))"
                      @pointerup="ptzStopRepeat()"
                      @pointerleave="ptzStopRepeat()">&#9664;</button>
              <button class="ptz-btn ptz-home" @click="ptzHome(camIdx)" title="Home">&#8962;</button>
              <button class="ptz-btn ptz-right"
                      @pointerdown.prevent="ptzStartRepeat(() => ptzPanTilt(camIdx, 1, 0))"
                      @pointerup="ptzStopRepeat()"
                      @pointerleave="ptzStopRepeat()">&#9654;</button>
            </div>
            <button class="ptz-btn ptz-down"
                    @pointerdown.prevent="ptzStartRepeat(() => ptzPanTilt(camIdx, 0, -1))"
                    @pointerup="ptzStopRepeat()"
                    @pointerleave="ptzStopRepeat()">&#9660;</button>
          </div>

          <!-- Zoom — go-to steps, no stop command needed -->
          <div class="ptz-zoom-row">
            <span class="ptz-label">Zoom</span>
            <button class="ptz-btn ptz-zoom-out"
                    @pointerdown.prevent="ptzStartRepeat(() => ptzZoom(camIdx, 'out'))"
                    @pointerup="ptzStopRepeat()"
                    @pointerleave="ptzStopRepeat()">W&minus;</button>
            <button class="ptz-btn ptz-zoom-in"
                    @pointerdown.prevent="ptzStartRepeat(() => ptzZoom(camIdx, 'in'))"
                    @pointerup="ptzStopRepeat()"
                    @pointerleave="ptzStopRepeat()">T+</button>
          </div>

          <!-- Focus — server auto-stops drive after 500 ms; no stop button needed -->
          <div class="ptz-focus-row">
            <span class="ptz-label">Focus</span>
            <button class="ptz-btn" @click="ptzFocus(camIdx, 'auto')">Auto</button>
            <button class="ptz-btn"
                    @pointerdown.prevent="ptzStartRepeat(() => ptzFocus(camIdx, 'near'))"
                    @pointerup="ptzStopRepeat()"
                    @pointerleave="ptzStopRepeat()">Near</button>
            <button class="ptz-btn"
                    @pointerdown.prevent="ptzStartRepeat(() => ptzFocus(camIdx, 'far'))"
                    @pointerup="ptzStopRepeat()"
                    @pointerleave="ptzStopRepeat()">Far</button>
          </div>

          <!-- Presets -->
          <div class="ptz-presets" x-show="cam.presets && cam.presets.length > 0">
            <div class="ptz-preset-row">
              <span class="ptz-label">Presets</span>
              <template x-for="p in cam.presets" :key="p">
                <button class="ptz-btn ptz-preset-btn"
                        @click="ptzPreset(camIdx, 'recall', p)"
                        x-text="p + 1"></button>
              </template>
            </div>
          </div>
        </div>
      </template>
    </section>

    <!-- ===================== Settings Panel ===================== -->
    <section class="panel" :class="{ active: $store.ui.tab==='settings' }"
             x-data="settingsPanel()">

      <div class="settings-section">
        <h2>This server</h2>
        <template x-for="url in serverAddresses" :key="url">
          <div class="server-address-row">
            <a :href="url" target="_blank" x-text="url" class="server-address-link"></a>
            <div class="qr-anchor">
              <span class="qr-icon">&#x1F4F1;</span>
              <img class="qr-popup" :src="'/api/server/qr?url='+encodeURIComponent(url)" :alt="'QR for '+url">
            </div>
          </div>
        </template>
      </div>

      <div class="settings-section">
        <h2>OBS</h2>
        <label>Address <input type="text" x-model="cfg.obs.address" placeholder="ws://localhost:4455"></label>
        <label>Password <input type="password" x-model="cfg.obs.password" placeholder="(leave blank if none)"></label>
        <label>Screenshot interval (ms) <input type="number" x-model.number="cfg.obs.screenshotInterval" placeholder="1000" min="200"></label>
        <div class="discover-row">
          <button class="btn" @click="discoverObs()">Auto-detect</button>
          <span class="discover-status" x-text="discoverStatus.obs"></span>
        </div>
      </div>

      <div class="settings-section">
        <h2>X32</h2>
        <label>Address <input type="text" x-model="cfg.x32.address" placeholder="192.168.1.100"></label>
        <label>Port <input type="number" x-model.number="cfg.x32.port" placeholder="10023"></label>
        <div class="discover-row">
          <button class="btn" @click="discoverX32()">Auto-detect</button>
          <span class="discover-status" x-text="discoverStatus.x32"></span>
        </div>
        <p style="color:var(--fg-dim,#888);font-size:0.85em;margin-top:8px">Channels are discovered automatically from the X32.</p>
      </div>

      <div class="settings-section">
        <h2>Proclaim</h2>
        <label>Host <input type="text" x-model="cfg.proclaim.host" placeholder="127.0.0.1"></label>
        <label>Port <input type="number" x-model.number="cfg.proclaim.port" placeholder="52195"></label>
        <label>Password <input type="password" x-model="cfg.proclaim.password" placeholder="proclaim"></label>
        <label>Poll interval (ms) <input type="number" x-model.number="cfg.proclaim.pollInterval" placeholder="1000" min="500"></label>
        <div class="discover-row">
          <button class="btn" @click="discoverProclaim()">Auto-detect</button>
          <span class="discover-status" x-text="discoverStatus.proclaim"></span>
        </div>
      </div>

      <div class="settings-section">
        <h2>PTZ Cameras</h2>
        <template x-for="(cam, i) in cfg.ptz.cameras" :key="i">
          <div class="settings-subsection">
            <h3 x-text="'Camera ' + (i + 1)"></h3>
            <label><input type="checkbox" x-model="cam.enabled"> Enabled</label>
            <label>Name <input type="text" x-model="cam.name" placeholder="Camera"></label>
            <label>IP Address <input type="text" x-model="cam.address" placeholder="192.168.1.101"></label>
            <label>Port <input type="number" x-model.number="cam.port" placeholder="52381"></label>
            <label>Camera ID <input type="number" x-model.number="cam.cameraId" placeholder="1" min="1" max="7"></label>
            <label>Presets <input type="number" x-model.number="cam.numPresets" placeholder="9" min="0" max="255"></label>
          </div>
        </template>
      </div>

      <div class="settings-section">
        <h2>YouTube</h2>
        <label>API Key <input type="password" x-model="cfg.youtube.apiKey" placeholder="(YouTube Data API v3 key)"></label>
        <label>Broadcast ID <input type="text" x-model="cfg.youtube.broadcastId" placeholder="(YouTube video/broadcast ID)"></label>
        <label>Poll interval (ms) <input type="number" x-model.number="cfg.youtube.pollInterval" placeholder="30000" min="5000"></label>
        <label>OAuth Client ID <input type="text" x-model="cfg.youtube.oauth.clientId" placeholder="(OAuth client ID)"></label>
        <label>OAuth Client Secret <input type="password" x-model="cfg.youtube.oauth.clientSecret" placeholder="(OAuth client secret)"></label>
        <label>OAuth Refresh Token <input type="password" x-model="cfg.youtube.oauth.refreshToken" placeholder="(OAuth refresh token)"></label>
        <div class="discover-row">
          <button class="btn" @click="importYouTubeCredsFromObs()">Import from OBS</button>
          <span class="discover-status" x-text="importObsStatus"></span>
        </div>
      </div>

      <div class="settings-footer">
        <button class="btn btn-primary" @click="saveConfig()">Save &amp; Apply</button>
        <span class="discover-status" x-text="saveStatus"></span>
      </div>

      <div class="settings-section">
        <h2>Logs</h2>
        <div class="log-toolbar">
          <button class="btn" @click="loadLogs()">Refresh</button>
          <button class="btn" @click="logs=[]">Clear display</button>
        </div>
        <pre class="log-output" x-ref="logOutput">
          <template x-for="entry in logs" :key="entry.ts+entry.msg">
            <span :class="'log-'+entry.level" x-text="entry.ts.replace('T',' ').replace(/\.\d+Z$/,'Z')+' '+entry.msg+'\n'"></span>
          </template>
        </pre>
      </div>
    </section>

    <!-- Disconnected overlay -->
    <div class="disconnected-overlay" x-show="!$store.ui.serverConnected">
      <div class="disconnected-message">Disconnected — reconnecting&hellip;</div>
    </div>

  </main>

  <script src="/app.js"></script>
</body>
</html>
